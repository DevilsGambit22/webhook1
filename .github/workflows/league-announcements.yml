name: League Season Announcements

on:
  workflow_dispatch:

jobs:
  announce:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord Webhook
        uses: fjogeleit/http-request-action@v1

        with:
          url: ${{ secrets.DISCORD_LEAGUE_ANNOUNCEMENTS }}
          method: POST
          customHeaders: '{"Content-Type":"application/json"}'
          data: |
            {
              "content": "⚔️ ACFA League Test\n\nGitHub is connected successfully!"
            }
