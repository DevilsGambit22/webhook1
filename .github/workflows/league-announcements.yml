name: ACFA League Command Center

on:
  workflow_dispatch:
    inputs:
      type:
        description: "League update type"
        required: true
        default: "Season Announcement"
        type: choice
        options:
          - Season Announcement
          - Round Pairings
          - Match Result
          - Standings Update
          - Bracket Update
          - Owner Reminder
          - Hall of Honor
          - Emergency Notice
      title:
        description: "Title"
        required: true
        default: "ACFA League Season 1"
      message:
        description: "Main message"
        required: true
        default: "Fight for Your Club. Earn Your Legacy."
      link:
        description: "Optional link"
        required: false
        default: ""

jobs:
  send-league-update:
    runs-on: ubuntu-latest

    steps:
      - name: Send ACFA League Update
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.DISCORD_LEAGUE_ANNOUNCEMENTS }}
          method: POST
          customHeaders: '{"Content-Type":"application/json"}'
          data: |
            {
              "username": "ACFA League",
              "embeds": [
                {
                  "title": "⚔️ ${{ github.event.inputs.title }}",
                  "description": "${{ github.event.inputs.message }}",
                  "color": 13632027,
                  "fields": [
                    {
                      "name": "Update Type",
                      "value": "${{ github.event.inputs.type }}",
                      "inline": true
                    },
                    {
                      "name": "League Motto",
                      "value": "Fight for Your Club. Earn Your Legacy.",
                      "inline": false
                    },
                    {
                      "name": "Link",
                      "value": "${{ github.event.inputs.link }}",
                      "inline": false
                    }
                  ],
                  "footer": {
                    "text": "ACFA League Command Center"
                  }
                }
              ]
            }
